[Service]
# Security hardening — each directive eliminates a class of attacks.
NoNewPrivileges=true
ProtectSystem=strict
ProtectHome=read-only

# Bot needs write access throughout its own home — Codex ACP writes to
# ~/.codex/, npx caches under ~/.cache, plugins install runtime deps to
# ~/.npm and ~/.npm-global, memory-core writes to ~/.openclaw.
# ProtectHome=read-only still blocks writes to /home/demos (demos dir
# mode 700 also blocks reads regardless, so defense in depth).
ReadWritePaths=/home/openclaw

PrivateTmp=true
ProtectKernelTunables=true
ProtectKernelModules=true
ProtectControlGroups=true
RestrictNamespaces=true
RestrictRealtime=true
# V8 JIT requires W+X memory — must NOT be true.
MemoryDenyWriteExecute=false
